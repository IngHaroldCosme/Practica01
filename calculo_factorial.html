<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factorial de un número</title>
</head>
<body>
    <h2>Calcular factorial</h2>

    <input type="number" id="numero" placeholder="Ingrese un número">
    <button onclick="calcularFactorial()">Calcular</button>

    <p id="resultado"></p>

    <script>
        function calcularFactorial() {
            let num = parseInt(document.getElementById("numero").value);
            let factorial = 1;

            if (num < 0) {
                document.getElementById("resultado").innerText = "No existe factorial de número negativo";
                return;
            }

            for (let i = 1; i <= num; i++) {
                factorial *= i;
            }

            document.getElementById("resultado").innerText = "Factorial: " + factorial;
        }
    </script>
</body>
</html>
